<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link href="styles.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>  
  </head>

  <body>

    <div class="weather-app">

      <div id="current-date" class="current-date"></div>


    </br></br>
      <form id="city-form">
        <input type="search" id="search-text-input" placeholder="Enter a city..." required class="search-input">
        <input type="submit" value="Search" class="search-button">
      </form>
      
    </br>

    <main>

      <div class="current-weather">

      </br>

        <div>
          <h1 class="current-city" id="current-city">City</h1>
        </div>

      </br>

        <span class="current-temperature-value" id="current-temperature">0</span>
        <span class="current-temperature-unit">°C</span>

      </br>

      <div class="current-temperature">
        <div class="current-temperature-icon">☁️</div>
      </div>

        <div class="current-details">
          <span id="temperature-details">💧 <strong>Humidity:</strong> ..% - 🌬️ <strong>Wind:</strong> ..km/h</span>
        </div>

      </div>

    </main>
  </br></br></br>
    <footer>
      <footer>
        <p>
          This project was coded by
          <a href="https://github.com/madamemarion" target="_blank">Marion</a> and is
          <a href="https://github.com/madamemarion/weather-app" target="_blank"> on GitHub</a> and
          <a href="https://sunnyrainy.netlify.app/" target="_blank">hosted on Netlify</a>
        </p>
    </footer>
    
    <script src="script.js"></script>
  </body>
</html>
